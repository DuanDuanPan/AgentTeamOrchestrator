repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.10
    hooks:
      - id: ruff
        args: [--fix]
        exclude: ^(\.(agent|agents|claude)/|_bmad/)
      - id: ruff-format
        exclude: ^(\.(agent|agents|claude)/|_bmad/)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        additional_dependencies:
          - aiosqlite>=0.22.1
          - pydantic>=2.0
          - "pydantic-settings[yaml]>=2.13"
          - pytest>=9.0.2
          - pytest-asyncio>=1.3.0
          - python-statemachine>=3.0
          - structlog
          - textual>=2.0
          - typer
          - types-PyYAML>=6.0
        exclude: ^(\.(agent|agents|claude)/|_bmad/)
