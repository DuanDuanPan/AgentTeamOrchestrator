repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.10
    hooks:
      - id: ruff
        args: [--fix]
        exclude: ^(\.(agent|agents|claude)/|_bmad/)
      - id: ruff-format
        exclude: ^(\.(agent|agents|claude)/|_bmad/)
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy src/ tests/
        language: system
        types: [python]
        pass_filenames: false
        exclude: ^(\.(agent|agents|claude)/|_bmad/)
